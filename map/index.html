<html lang="en">
	<head>
		<meta charset="utf-8">

        <!-- only using for testing slider, will be changed to local paths -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.4/dist/leaflet.css"
            integrity="sha512-puBpdR0798OZvTTbP4A8Ix/l+A4dHDD0DGqYW6RQ+9jxkRFclaxxQb/SJAWZfWAkuyeQUytO7+7N4QKrDh+drA=="
            crossorigin=""/> <!-- Adding ref to leaflet css, will be replaced with local links--->
        
        <script src="https://unpkg.com/leaflet@1.3.4/dist/leaflet.js"
            integrity="sha512-nMMmRyTVoLYqjP9hrbed9S+FzjZHW5gY1TWCHA5ckwXZBadntCNs8kEqAWdrb9O7rxbCaA4lKTIWjDXZxflOcA=="
            crossorigin=""></script> <!-- adding ref to leaflet js will be replaced with local links--->
        <link rel="stylesheet" href="https://code.jquery.com/ui/1.9.2/themes/base/jquery-ui.css" type="text/css">
    
        
        
		<link rel="stylesheet" href="css/style.css">
        <script src="lib/leaflet.ajax.min.js"></script>
		<!--[if IE<9]>
			<link rel="stylesheet" href="css/style.ie.css">
		<![endif]-->
        
	</head>

	<body>
        <!-- update with local paths -->
        <script src="https://code.jquery.com/jquery-1.9.1.min.js"></script>
        <script src="https://code.jquery.com/ui/1.9.2/jquery-ui.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.2/jquery.ui.touch-punch.min.js"></script>
        <script src="https://rawgit.com/dwilhelm89/LeafletSlider/master/SliderControl.js" type="text/javascript"></script>
        <!-- <div class = "overlay">
            <button type="button">hello</button>
        </div> -->
        <div id="mapid" style="width:100%"></div>
        
		<!--put your initial page content here-->

		<script> // include leaflet JS here
            
            var sliderControl = null;
            var streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }); // osm declaration of var
            var Esri_NatGeoWorldMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}', {attribution: 'Tiles &copy; Esri &mdash; National Geographic, Esri, DeLorme, NAVTEQ, UNEP-WCMC, USGS, NASA, ESA, METI, NRCAN, GEBCO, NOAA, iPC',maxZoom: 16}); // esri baemap declaration
            var Esri_WorldImagery = L.tileLayer('http://server.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {attribution: 'Tiles &copy; Esri &mdash; National Geographic, Esri, DeLorme, NAVTEQ, UNEP-WCMC, USGS, NASA, ESA, METI, NRCAN, GEBCO, NOAA, iPC',maxZoom: 16});
            
            var frontLayer = new L.GeoJSON.AJAX("geodata/dailyFront/front.geojson");
            var june20 = new L.GeoJSON.AJAX("geodata/DivLocations/combined.geojson");

            var mymap = L.map('mapid', {
                center: [49.185396, -0.55481],
                zoom: 8,
                layers: [Esri_NatGeoWorldMap, frontLayer]
            }); // declare map and set view
            
            //mymap.setView([39.721184, -104.967327], 12); use this to set view
            
            var baseMaps = {
                "Open Street Map": streets, 
                "Esri World Map": Esri_NatGeoWorldMap,
                "Esri World Imagery": Esri_WorldImagery
            };
            
            var overlayFront = {
                "Key Front Lines": frontLayer
            };
            
            june20.addTo(mymap);
            mymap.setView([49.185396, -0.55481], 9);
            //Esri_NatGeoWorldMap.addTo(mymap); //using to just set basemap
            
            L.control.layers(baseMaps, overlayFront).addTo(mymap); // adding layer contorl to map
            //statesLayer.addTo(mymap);
            
            //test of slider
            var sliderControl = L.control.sliderControl({
                position: "bottomright",
                layer: june20,
                range: true,
                timeAttribute: "DateStart"
            });
            
            mymap.addControl(sliderControl);
            
            sliderControl.startSlider();
            
            //end of test!!!!!
            
            //test of overlay
            
            
            
           
            var popup = L.popup();  // adding the declated GeoJson to map

            function onMapClick(e) {
                popup
                    .setLatLng(e.latlng)
                    .setContent("clicked at: " + e.latlng.toString())
                    .openOn(mymap);
            } // dispays lat long on user click

            mymap.on('click', onMapClick); // created a pop up that notes lat long of mouse
           //frontLayer.bindPopup("this is the front").openPopup();
            frontLayer.bindTooltip("this is the front").openTooltip();
            //mymap.setView([39.721184, -104.967327], 12); // need to set view after every sequence of new items to center the map
            
            
        </script>

		<!--put your external script links here-->
		<script type="text/javascript" src="js/main.js"></script>
	</body>
</html>
