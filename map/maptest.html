<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width">
		<title>Test Title</title>

		 <link rel="stylesheet" href="/lib/leaflet.css">> <!-- Adding ref to leaflet css --->
        
        <script src="/lib/leaflet.js"></script> <!-- adding ref to leaflet jss -->
        
		<link rel="stylesheet" href="css/style.css">
		<!--[if IE<9]>
			<link rel="stylesheet" href="css/style.ie.css">
		<![endif]-->
	</head>

	<body>
        <div id="mapid" style="width:100%"></div>
        
		<!--put your initial page content here-->

		<script> // include leaflet JS here
            
            
            var mymap = L.map('mapid').setView([32.77, -104.99], 15); // set initial view of mapbox tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(mymap); // using open street map here instead
            
            /* commenting out for use later (mapbox)
            L.tileLayer('https://api.tiles.mapbox.com/v4/{id}/{z}/{x}/{y}.png?access_token=pk.eyJ1IjoicmFuZHktZ2FyY2lhIiwiYSI6ImNpeHZ4dzd0cjAwMHgyd3Fxc3AzMTJmdHYifQ.KHY2-8F3pVDCBJhShln7yA', {
                attribution: 'Map data &copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors, <a href="https://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>, Imagery © <a             href="https://www.mapbox.com/">Mapbox</a>',
                maxZoom: 18,
                id: 'mapbox.outdoors',
                accessToken: 'pk.eyJ1IjoicmFuZHktZ2FyY2lhIiwiYSI6ImNpeHZ4dzd0cjAwMHgyd3Fxc3AzMTJmdHYifQ.KHY2-8F3pVDCBJhShln7yA'
            }).addTo(mymap); //adding the leaflet map to the page
            */
            
            var marker = L.marker([39.721184, -104.967327]).addTo(mymap); // marker symbol in london
            
            var circle = L.circle([39.69213, -104.946899], {
                color: 'red',
                fillColor: '#f03',
                fillOpacity: 0.5,
                radius: 500
            }).addTo(mymap); // circle symbol east of london
            
            var triangle = L.polygon([
                [39.755241, -104.829826],
                [39.711148, -104.858322],
                [39.705338, -104.759102]
            ]).addTo(mymap); // adding polygon to map triangle east of london
            
            marker.bindPopup("<b>Hello world!</b><br>I am a popup.").openPopup();
            circle.bindPopup("I am a circle.");
            triangle.bindPopup("I am a polygon.");
            
            var popup = L.popup()
                .setLatLng([39.796667, -104.997025])
                .setContent("I am a standalone popup.")
                .openOn(mymap);
            
            function onMapClick(e) {
            alert("You clicked the map at " + e.latlng);
            }
            mymap.on('click', onMapClick); // created a pop up that notes lat long of mouse
           
            mymap.setView([39.721184, -104.967327], 12); // need to set view after every sequence of new items to center the map
            
            
        </script>

		<!--put your external script links here-->
		<script type="text/javascript" src="js/main.js"></script>
	</body>
</html>
